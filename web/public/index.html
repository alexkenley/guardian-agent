<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian Agent Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/workstation.css">
</head>
<body>
  <!-- Auth Modal -->
  <div id="auth-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Guardian Agent</h2>
      <p>Enter your authentication token to continue.</p>
      <form id="auth-form">
        <input type="password" id="auth-token-input" placeholder="Bearer token" autocomplete="off">
        <button id="auth-submit" class="btn btn-primary" type="submit">Connect</button>
        <p id="auth-error" class="error-text" style="display:none;"></p>
      </form>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" style="display:none;">
    <header class="header">
      <div class="header-left">
        <h1 class="logo">
          <span class="logo-mark" aria-hidden="true"></span>
          <span class="logo-text">Guardian Agent</span>
        </h1>
      </div>
      <div class="header-right">
        <span id="header-clock" class="header-clock"></span>
        <span id="connection-indicator" class="indicator disconnected">Disconnected</span>
        <button id="workstation-toggle" class="btn btn-secondary btn-workstation-toggle" type="button" title="Open workstation shell">
          <svg class="shell-action-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="7" height="9"/>
            <rect x="14" y="3" width="7" height="5"/>
            <rect x="14" y="12" width="7" height="9"/>
            <rect x="3" y="16" width="7" height="5"/>
          </svg>
          <span>Workstation</span>
        </button>
        <button id="killswitch-btn" class="btn-killswitch" title="Shut down all services">
          <svg class="shell-action-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m13 2-9 13h7l-1 7 9-13h-7l1-7Z"/>
            <path d="m3 3 18 18"/>
          </svg>
          <span>Killswitch</span>
        </button>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar" id="app-sidebar">
        <a href="#/" class="nav-item active" data-page="second-brain" title="Second Brain">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M9.5 2a4.5 4.5 0 0 0-4.4 3.5A3.5 3.5 0 0 0 3 9c0 1.2.6 2.3 1.5 3A3.5 3.5 0 0 0 7 18.5h.5V22h9V2H9.5Z"/>
            </svg>
          </span>
          <span class="nav-label"> Second Brain</span>
        </a>
        <a href="#/system" class="nav-item" data-page="system" title="System">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
          </span>
          <span class="nav-label"> System</span>
        </a>
        <a href="#/security" class="nav-item" data-page="security" title="Security">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
              <path d="m9 12 2 2 4-4"/>
            </svg>
          </span>
          <span class="nav-label"> Security</span>
        </a>
        <a href="#/network" class="nav-item" data-page="network" title="Network">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20"/>
              <path d="M12 2a15 15 0 0 1 0 20"/>
              <path d="M12 2a15 15 0 0 0 0 20"/>
            </svg>
          </span>
          <span class="nav-label"> Network</span>
        </a>
        <a href="#/cloud" class="nav-item" data-page="cloud" title="Cloud">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M17.5 19a4.5 4.5 0 1 0-1.5-8.7 7 7 0 0 0-13.5 2.6A4 4 0 0 0 5.5 19h12Z"/>
            </svg>
          </span>
          <span class="nav-label"> Cloud</span>
        </a>
        <a href="#/automations" class="nav-item" data-page="automations" title="Automations">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M18 3 22 7l-4 4"/>
              <path d="M8 7v3a4 4 0 0 1-4 4h0"/>
              <path d="M6 21l-4-4 4-4"/>
              <path d="M16 17v-3a4 4 0 0 1 4-4h0"/>
            </svg>
          </span>
          <span class="nav-label"> Automations</span>
        </a>
        <a href="#/code" class="nav-item" data-page="code" title="Code">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m16 18 6-6-6-6"/>
              <path d="m8 6-6 6 6 6"/>
            </svg>
          </span>
          <span class="nav-label"> Code</span>
        </a>
        <a href="#/memory" class="nav-item" data-page="memory" title="Memory">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path d="M3 5v14a9 3 0 0 0 18 0V5"/>
              <path d="M3 12a9 3 0 0 0 18 0"/>
            </svg>
          </span>
          <span class="nav-label"> Memory</span>
        </a>
        <a href="#/reference" class="nav-item" data-page="reference" title="Reference Guide">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </span>
          <span class="nav-label"> Reference</span>
        </a>
        <a href="#/performance" class="nav-item" data-page="performance" title="Performance Manager">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 2v4"/>
              <path d="M12 18v4"/>
              <path d="m4.93 4.93 2.83 2.83"/>
              <path d="m16.24 16.24 2.83 2.83"/>
              <path d="M2 12h4"/>
              <path d="M18 12h4"/>
              <path d="m4.93 19.07 2.83-2.83"/>
              <path d="m16.24 7.76 2.83-2.83"/>
            </svg>
          </span>
          <span class="nav-label"> Performance</span>
        </a>
        <a href="#/config" class="nav-item" data-page="config" title="Configuration">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
            </svg>
          </span>
          <span class="nav-label"> Configuration</span>
        </a>
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" title="Collapse sidebar" aria-label="Collapse sidebar">
          <svg class="shell-action-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </button>
      </nav>

      <main id="content" class="content">
        <!-- Pages render here -->
      </main>

      <aside id="chat-panel" class="chat-panel">
        <!-- Persistent Chat renders here -->
      </aside>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
