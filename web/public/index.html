<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian Agent Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Auth Modal -->
  <div id="auth-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Guardian Agent</h2>
      <p>Enter your authentication token to continue.</p>
      <input type="password" id="auth-token-input" placeholder="Bearer token" autocomplete="off">
      <button id="auth-submit" class="btn btn-primary">Connect</button>
      <p id="auth-error" class="error-text" style="display:none;"></p>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" style="display:none;">
    <header class="header">
      <div class="header-left">
        <h1 class="logo">&#x1F6E1; Guardian Agent</h1>
      </div>
      <div class="header-right">
        <span id="header-clock" class="header-clock"></span>
        <span id="connection-indicator" class="indicator disconnected">Disconnected</span>
        <button id="killswitch-btn" class="btn-killswitch" title="Shut down all services">&#x26A1; Killswitch</button>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar">
        <a href="#/" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">&#x1F6E1;</span> Dashboard
        </a>
        <a href="#/security" class="nav-item" data-page="security">
          <span class="nav-icon">&#x2694;</span> Security
        </a>
        <a href="#/network" class="nav-item" data-page="network">
          <span class="nav-icon">&#x1F310;</span> Network
        </a>
        <a href="#/automations" class="nav-item" data-page="automations">
          <span class="nav-icon">&#x2699;</span> Automations
        </a>
        <a href="#/config" class="nav-item" data-page="config">
          <span class="nav-icon">&#x2699;</span> Configuration
        </a>
        <a href="#/reference" class="nav-item" data-page="reference">
          <span class="nav-icon">&#x1F4D6;</span> Reference Guide
        </a>
      </nav>

      <main id="content" class="content">
        <!-- Pages render here -->
      </main>

      <aside id="chat-panel" class="chat-panel">
        <!-- Persistent Chat renders here -->
      </aside>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
